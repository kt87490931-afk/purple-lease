# /var/www/purple-lease/nginx-purple-lease.conf
# clean URL: /estimate → estimate.html, *.html → 301 redirect

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name purpleauto.co.kr www.purpleauto.co.kr 152.42.213.222 _;

    include snippets/purple-ks-proxy.conf;

    root /var/www/purple-lease;
    index index.html;

    location ^~ /mok/ {
        return 404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
    }

    location = /index.html {
        return 301 $scheme://$host/$is_args$args;
    }

    location ~ ^/(.+)\.html$ {
        return 301 $scheme://$host/$1$is_args$args;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|txt|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 256;
}
