# KS오토플랜 CORS 우회 — 어드민 동기화용 (동일 출처 프록시)
# include snippets/purple-ks-proxy.conf; 로 server 블록에 삽입
location /api/ks/ {
    proxy_pass https://ks-rentcar.com/;
    proxy_ssl_server_name on;
    proxy_set_header Host ks-rentcar.com;
    proxy_set_header Accept-Encoding "";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_domain ks-rentcar.com $host;
    proxy_cookie_path / /api/ks/;
    proxy_redirect off;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;
}
