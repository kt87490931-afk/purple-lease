name: Run Analytics Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload migration files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/migration-analytics.sql,deploy/run-migration-analytics.sh"
          target: /var/www/purple-lease
          strip_components: 0
          overwrite: true

      - name: Run migration on server (psql IPv6)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /var/www/purple-lease/deploy/run-migration-analytics.sh
            export SUPABASE_DB_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
            bash /var/www/purple-lease/deploy/run-migration-analytics.sh

      - name: Verify visit_logs REST (service role read)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::service role missing — skip REST verify"
            exit 0
          fi
          HTTP=$(curl -sS -o /tmp/vl.json -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/visit_logs?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY")
          cat /tmp/vl.json
          if [ "$HTTP" != "200" ]; then
            echo "::error::visit_logs REST HTTP $HTTP"
            exit 1
          fi
          echo "visit_logs table OK"
