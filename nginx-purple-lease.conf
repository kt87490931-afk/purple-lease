# DigitalOcean /var/www/purple-lease
# Cloudflare Full(strict) 사용 시: Origin Certificate를 /etc/ssl/cloudflare/ 에 설치 후
# 아래 443 server 블록 주석을 해제하세요. (Flexible만 쓸 때는 80 블록만으로 충분)

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name purpleauto.co.kr www.purpleauto.co.kr 152.42.213.222 _;

    # purple-ks-proxy (어드민 KS 동기화)
    include snippets/purple-ks-proxy.conf;

    root /var/www/purple-lease;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

