name: Run Analytics Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload migration files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "supabase/migration-analytics.sql,scripts/run-migration-analytics.mjs"
          target: /var/www/purple-lease
          strip_components: 0
          overwrite: true

      - name: Run migration on server (IPv6 direct DB)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /var/www/purple-lease
            npm install pg --no-save 2>/dev/null || npm install pg --no-save
            export SUPABASE_DB_PASSWORD="${{ secrets.SUPABASE_DB_PASSWORD }}"
            export MIGRATION_ON_SERVER=1
            node scripts/run-migration-analytics.mjs

      - name: Verify visit_logs REST (service role read)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::warning::service role missing — skip REST verify"
            exit 0
          fi
          curl -sf "$SUPABASE_URL/rest/v1/visit_logs?select=id&limit=1" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY"
          echo "visit_logs table readable"
