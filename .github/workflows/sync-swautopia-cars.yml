name: Sync Swautopia Used Cars

# Required secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY
# 하루 4회(6시간마다) — 매물 메타·판매상태만 갱신 (사진 Storage 업로드는 어드민 수동파싱)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync swautopia used cars (metadata)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_ROLE_KEY" ]; then
            echo "::error::Missing secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY"
            exit 1
          fi
          node scripts/sync-swautopia-cars.js
