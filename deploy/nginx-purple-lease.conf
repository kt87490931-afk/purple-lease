# /var/www/purple-lease/deploy/nginx-purple-lease.conf
# Cloudflare Flexible: 80만 사용. Full(strict) 시 Origin Certificate 설치 후 443 블록 주석 해제.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name purpleauto.co.kr www.purpleauto.co.kr 152.42.213.222 _;

    root /var/www/purple-lease;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}

