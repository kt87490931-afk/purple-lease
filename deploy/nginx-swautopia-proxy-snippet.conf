# swautopia CORS 우회 — 어드민 수동파싱·이미지 프록시
# ^~ 필수: 아래 정적 .jpg location보다 우선 (안 그러면 이미지 404)
location ^~ /api/swautopia/ {
    proxy_pass https://swautopia.co.kr/;
    proxy_ssl_server_name on;
    proxy_set_header Host swautopia.co.kr;
    proxy_set_header Accept-Encoding "";
    proxy_set_header Referer https://swautopia.co.kr/;
    proxy_set_header User-Agent "Mozilla/5.0 (compatible; PurpleLeaseSync/1.0)";
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;
    proxy_read_timeout 120s;
    proxy_connect_timeout 30s;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
    add_header Cross-Origin-Resource-Policy "cross-origin" always;
}
