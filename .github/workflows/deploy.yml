name: Deploy to DigitalOcean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "*.html,js,assets,robots.txt"
          target: /var/www/purple-lease
          strip_components: 0
          overwrite: true

      - name: Fix permissions
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            rm -f /var/www/purple-lease/used-cars_1.html /var/www/purple-lease/Easyquote.html
            chmod 644 /var/www/purple-lease/robots.txt 2>/dev/null || true
            chown -R www-data:www-data /var/www/purple-lease
            chmod -R 755 /var/www/purple-lease
