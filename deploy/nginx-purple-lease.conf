# /var/www/purple-lease/deploy/nginx-purple-lease.conf
# clean URL: /estimate → estimate.html, *.html → 301 redirect

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name purpleauto.co.kr www.purpleauto.co.kr 152.42.213.222 _;

    include snippets/purple-ks-proxy.conf;

    root /var/www/purple-lease;
    index index.html;

    # /mok/ 프로토타입 완전 차단
    location ^~ /mok/ {
        return 404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /Sitemap.xml {
        return 301 https://$host/sitemap.xml;
    }

    location = /sitemap.xml {
        root /var/www/purple-lease;
        default_type application/xml;
        types { application/xml xml; }
        add_header Content-Type "application/xml; charset=utf-8" always;
        add_header Cache-Control "public, max-age=300" always;
        try_files /sitemap.xml =404;
    }

    # index.html → /
    location = /index.html {
        return 301 https://$host/$is_args$args;
    }

    # *.html → clean URL (301)
    location ~ ^/(.+)\.html$ {
        return 301 https://$host/$1$is_args$args;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    # 어드민·admin JS — 배포 직후 반영 (장기 캐시 방지)
    location ~* ^/js/admin-(app|api|auth)\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* ^/js/sitemap-builder\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /admin.html {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|txt|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 256;
}
