name: Run SEO Migration

# Supabase Dashboard > Settings > Database > Database password
# GitHub secret: SUPABASE_DB_PASSWORD

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pg
        run: npm install pg --no-save

      - name: Run migration-seo.sql
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "::error::SUPABASE_DB_PASSWORD secret missing"
            echo "Supabase Dashboard > Project Settings > Database > Database password"
            echo "GitHub > Settings > Secrets > Actions > New repository secret"
            exit 1
          fi
          node scripts/run-migration-seo.mjs

      - name: Verify REST read (anon)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_URL / SUPABASE_ANON_KEY 없음 — REST 검증 생략"
            exit 0
          fi
          curl -sf "$SUPABASE_URL/rest/v1/seo_settings?id=eq.1&select=site_name" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY"
