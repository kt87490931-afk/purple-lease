name: Run Analytics Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run migration via Supabase Management API
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret required"
            exit 1
          fi
          QUERY=$(jq -Rs . supabase/migration-analytics.sql)
          HTTP=$(curl -sS -w "%{http_code}" -o /tmp/migrate-analytics-out.json \
            -X POST "https://api.supabase.com/v1/projects/zliclwgiaqvilnnookyi/database/query" \
            -H "Authorization: Bearer $SUPABASE_ACCESS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": $QUERY}")
          cat /tmp/migrate-analytics-out.json
          if [ "$HTTP" != "201" ] && [ "$HTTP" != "200" ]; then
            echo "::error::Management API HTTP $HTTP"
            exit 1
          fi
          echo "migration OK (HTTP $HTTP)"

      - name: Verify visit_logs REST (anon insert policy)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::SUPABASE_ANON_KEY missing — skip REST verify"
            exit 0
          fi
          curl -sf -X POST "$SUPABASE_URL/rest/v1/visit_logs" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{"path":"/__migration_test","visitor_type":"visitor","device_type":"desktop","user_agent":"migrate-analytics-verify"}'
          echo "visit_logs insert OK"
