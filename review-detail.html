<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>고객후기 — PURPLE LEASE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');

:root {
  --grad-main: linear-gradient(135deg, #8B2FE0 0%, #5B2FD6 45%, #1A1E6E 100%);
  --grad-text: linear-gradient(135deg, #8B2FE0 0%, #2030A0 100%);
  --purple-600: #8B2FE0;
  --purple-100: #F2E8FD;
  --purple-50: #FAF6FE;
  --navy-900: #11143A;
  --white: #FFFFFF;
  --surface: #FAFAFC;
  --surface-alt: #F4F2FA;
  --line: #E7E5F0;
  --line-soft: #EFEDF6;
  --ink-900: #15151D;
  --ink-700: #383846;
  --ink-500: #6B6B7B;
  --ink-400: #9494A3;
  --font-display: 'Sora', 'Noto Sans KR', sans-serif;
  --font-body: 'Noto Sans KR', 'Pretendard', sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --radius-sm: 6px;
  --radius-md: 12px;
  --radius-lg: 20px;
  --container: 860px;
  --shadow-sm: 0 1px 2px rgba(22,22,40,0.06);
  --shadow-md: 0 8px 24px rgba(40,30,90,0.08);
}

* { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
body { margin:0; background: var(--white); color: var(--ink-700); font-family: var(--font-body); font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; padding-bottom: 40px; }
img { max-width: 100%; display: block; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; }
h1,h2,h3,h4 { margin:0; font-family: var(--font-display); color: var(--ink-900); letter-spacing: -0.01em; }
p { margin:0; }

.wrap { max-width: var(--container); margin: 0 auto; padding: 0 18px; }

/* --- Header --- */
.site-header { position: sticky; top:0; z-index:100; background: rgba(255,255,255,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line-soft); }
.header-inner { display:flex; align-items:center; justify-content:space-between; height:64px; gap:16px; max-width:1180px; margin:0 auto; padding:0 18px; }
.logo { display:flex; align-items:baseline; gap:1px; flex-shrink:0; font-family: var(--font-display); }
.logo .logo-p { font-size:22px; font-weight:800; background: var(--grad-main); -webkit-background-clip:text; background-clip:text; color:transparent; }
.logo .logo-rest { font-size:18px; font-weight:700; color: var(--navy-900); letter-spacing:-0.01em; }
.logo .logo-img { height: 24px; width: auto; display: block; }
.footer-logo img, .footer-logo-img { height: 22px; width: auto; display: block; margin-bottom: 12px; }
.header-call { display:flex; align-items:center; gap:8px; font-family: var(--font-mono); font-size:13px; color: var(--ink-900); font-weight:700; }
.category-nav { background: var(--white); border-bottom: 1px solid var(--line-soft); overflow-x:auto; scrollbar-width:none; }
.category-nav::-webkit-scrollbar { display:none; }
.category-nav-inner { display:flex; min-width:max-content; max-width:1180px; margin:0 auto; padding:0 18px; }
.category-nav a { display:flex; align-items:center; padding:14px 18px; font-size:13px; font-weight:700; color: var(--ink-500); border-bottom:2px solid transparent; white-space:nowrap; }
.category-nav a.active { color: var(--navy-900); border-bottom-color: var(--purple-600); }

.crumb { font-size:12px; color: var(--ink-400); padding: 16px 0 6px; display:flex; align-items:center; gap:6px; }
.crumb a { color: var(--ink-400); }
.crumb .sep { opacity:.6; }
.crumb .cur { color: var(--ink-700); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:280px; }

/* --- 본문 헤드 --- */
.post-head { padding: 18px 0 20px; border-bottom: 1px solid var(--line); }
.post-head h1 { font-size: 19px; line-height:1.45; }
.post-meta { display:flex; align-items:center; gap:12px; margin-top:12px; font-size:12.5px; color: var(--ink-400); }
.post-meta .author { font-weight:700; color: var(--ink-700); }
.post-meta .dot { width:3px; height:3px; border-radius:50%; background: var(--ink-400); }

/* --- 본문 --- */
.post-body { padding: 26px 0 30px; font-size: 14.5px; line-height: 1.9; color: var(--ink-700); white-space: pre-line; }
.post-body img { border-radius: var(--radius-md); margin: 18px 0; }

/* --- 하단 네비 (이전글/다음글) --- */
.post-nav { border-top: 1px solid var(--line); padding: 6px 0; }
.post-nav-row { display:flex; align-items:center; gap:12px; padding: 13px 0; border-bottom: 1px solid var(--line-soft); font-size:13px; }
.post-nav-row .nav-label { flex-shrink:0; font-size:11.5px; font-weight:700; color: var(--ink-400); width:48px; }
.post-nav-row .nav-title { color: var(--ink-900); font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.post-nav-row:hover .nav-title { color: var(--purple-600); }
.post-nav-row.disabled { opacity:.4; pointer-events:none; }

.back-row { display:flex; justify-content:center; padding: 24px 0 8px; }
.btn-outline { display:inline-flex; align-items:center; gap:6px; padding:11px 20px; border-radius: var(--radius-md); font-weight:700; font-size:13.5px; border:1px solid var(--line); color: var(--ink-900); background: var(--white); }
.btn-outline:hover { border-color: var(--purple-600); color: var(--purple-600); }

/* Footer */
.site-footer { background: var(--surface-alt); border-top: 1px solid var(--line-soft); padding: 32px 0 40px; margin-top: 24px; }
.footer-meta { font-size: 12.5px; color: var(--ink-500); line-height:1.8; }
.footer-links { display:flex; gap:14px; margin:16px 0; flex-wrap:wrap; }
.footer-links a { font-size:12.5px; color: var(--ink-700); font-weight:600; }
.site-footer .wrap { max-width:1180px; }
</style>
</head>

      <span>1555-6362</span>
    </a>

  <nav class="category-nav">
    <div class="category-nav-inner">
      <a href="estimate.html">신차·리스·장기렌트카</a>
      <a href="used-cars.html">중고차</a>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/supabase-config.js"></script>
<script src="/js/supabase-data.js"></script>
<script>
/* ============================================================
   데이터 정의부 — 운영자가 어드민페이지에서 작성하는 후기 본문.
   목록 페이지(reviews-customer.html)와 동일한 id 체계를 공유합니다.
   실제 운영 시 서버 API(/api/reviews/{id})로 교체하면 됩니다.
   ============================================================ */
  const reviewContentDB = {
    1: { title: '재계약 시에도 신경써서 챙겨주셔서 좋았어요', date: '2026.06.25', views: 312,
      body: `이번에 재계약하면서도 처음 계약할 때처럼 꼼꼼하게 챙겨주셔서 감사했습니다.

기존 계약 만료 시점에 맞춰서 미리 연락 주셔서 공백 없이 차량을 계속 이용할 수 있었고, 신규 모델로 변경하는 과정도 번거롭지 않게 도와주셨어요.

다음에도 계속 이용할 것 같습니다. 감사합니다!` },
    2: { title: '수입차 장기렌트 옵션 설명 자세히 들었습니다', date: '2026.06.23', views: 245,
      body: `수입차는 처음이라 옵션이 너무 많아서 헷갈렸는데, 하나씩 비교해서 설명해주셔서 결정하는 데 큰 도움이 됐습니다.

가격대별로 어떤 옵션이 들어가는지 표로 정리해서 보여주셔서 이해하기 쉬웠어요.` },
  };

  function getDefaultReview(id) {
    return {
      title: `고객후기 #${id}`,
      date: '2026.06.20',
      views: Math.floor(Math.random() * 500) + 30,
      body: `운영자가 작성한 고객후기 본문이 이 영역에 표시됩니다.

실제 운영 시에는 어드민페이지에서 후기를 작성하면, 작성한 내용이 그대로 이 화면에 노출됩니다.`
    };
  }

  const params = new URLSearchParams(window.location.search);
  const id = parseInt(params.get('id'), 10);
  let review = reviewContentDB[id] || (id ? getDefaultReview(id) : null);

  function render() {
    if (!review) {
      document.querySelector('main .wrap').innerHTML = `
        <div style="text-align:center; padding:80px 0;">
          <p style="font-size:14px; color:var(--ink-500); margin-bottom:16px;">해당 후기를 찾을 수 없습니다.</p>
          <a href="reviews-customer.html" class="btn-outline">목록으로</a>
        </div>`;
      return;
    }
    document.title = review.title + ' — PURPLE LEASE';
    document.getElementById('crumbTitle').textContent = review.title;
    document.getElementById('postTitle').textContent = review.title;
    document.getElementById('postDate').textContent = review.date;
    document.getElementById('postViews').textContent = review.views.toLocaleString('ko-KR');
    document.getElementById('postBody').textContent = review.body;

    const prevId = id - 1;
    const nextId = id + 1;
    const prevTitle = (reviewContentDB[prevId] && reviewContentDB[prevId].title) || (prevId >= 1 ? `고객후기 #${prevId}` : null);
    const nextTitle = (reviewContentDB[nextId] && reviewContentDB[nextId].title) || `고객후기 #${nextId}`;

    const navPrev = document.getElementById('navPrev');
    const navNext = document.getElementById('navNext');
    if (prevTitle) {
      navPrev.href = `review-detail.html?id=${prevId}`;
      document.getElementById('navPrevTitle').textContent = prevTitle;
    } else {
      navPrev.classList.add('disabled');
      document.getElementById('navPrevTitle').textContent = '이전 글이 없습니다';
    }
    navNext.href = `review-detail.html?id=${nextId}`;
    document.getElementById('navNextTitle').textContent = nextTitle;
  }

  async function bootstrap() {
    if (window.PurpleLeaseData && window.PurpleLeaseData.isConfigured() && id) {
      try {
        const row = await window.PurpleLeaseData.fetchCustomerReviewDetail(id);
        if (row) review = row;
        const views = await window.PurpleLeaseData.incrementReviewViews(id);
        if (views) review.views = views;
      } catch (err) {
        console.warn('[PurpleLease] review detail load failed:', err);
      }
    }
    render();
  }

  bootstrap();
</script>
