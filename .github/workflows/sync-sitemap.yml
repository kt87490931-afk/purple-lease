name: Sync Sitemap to Server

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload sitemap + sync script
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "sitemap.xml,deploy/sync-sitemap-from-storage.sh"
          target: /var/www/purple-lease
          strip_components: 0
          overwrite: true

      - name: Sync sitemap on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /var/www/purple-lease/deploy/sync-sitemap-from-storage.sh
            bash /var/www/purple-lease/deploy/sync-sitemap-from-storage.sh || true
            cp /var/www/purple-lease/sitemap.xml /var/www/purple-lease/sitemap.xml.bak 2>/dev/null || true
            if [ -f /var/www/purple-lease/sitemap.xml ]; then
              chmod 644 /var/www/purple-lease/sitemap.xml
              chown www-data:www-data /var/www/purple-lease/sitemap.xml
            fi
            bash /var/www/purple-lease/deploy/install-nginx-domain.sh
