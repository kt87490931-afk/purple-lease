# /var/www/purple-lease/deploy/nginx-purple-lease.conf
# clean URL: /estimate → estimate.html, *.html → 301 redirect

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name purpleauto.co.kr www.purpleauto.co.kr 152.42.213.222 _;

    include snippets/purple-ks-proxy.conf;

    root /var/www/purple-lease;
    index index.html;

    # /mok/ 프로토타입 완전 차단
    location ^~ /mok/ {
        return 404;
    }

    location = /robots.txt {
        try_files /robots.txt =404;
    }

    location = /sitemap.xml {
        proxy_pass https://zliclwgiaqvilnnookyi.supabase.co/storage/v1/object/public/purple-uploads/seo/sitemap.xml;
        proxy_ssl_server_name on;
        proxy_set_header Host zliclwgiaqvilnnookyi.supabase.co;
        proxy_intercept_errors on;
        error_page 404 502 503 504 = @sitemap_static;
        add_header Cache-Control "public, max-age=60";
    }

    location @sitemap_static {
        try_files /sitemap.xml =404;
        add_header Content-Type application/xml;
    }

    # index.html → /
    location = /index.html {
        return 301 https://$host/$is_args$args;
    }

    # *.html → clean URL (301)
    location ~ ^/(.+)\.html$ {
        return 301 https://$host/$1$is_args$args;
    }

    location = / {
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|txt|xml)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml text/xml;
    gzip_min_length 256;
}
