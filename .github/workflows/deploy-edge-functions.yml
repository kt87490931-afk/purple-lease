name: Deploy Supabase Edge Functions

# Required secret: SUPABASE_ACCESS_TOKEN
# Create at https://supabase.com/dashboard/account/tokens

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ks-rentcar-proxy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::warning::SUPABASE_ACCESS_TOKEN secret missing — Edge Function not deployed."
            echo "Add token at: Supabase Dashboard > Account > Access Tokens"
            echo "Then add GitHub secret SUPABASE_ACCESS_TOKEN and re-run this workflow."
            exit 0
          fi
          supabase functions deploy ks-rentcar-proxy \
            --project-ref zliclwgiaqvilnnookyi \
            --no-verify-jwt
